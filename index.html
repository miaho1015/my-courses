<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mia's 課程庫 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4ede2;
    --bg2: #ede4d6;
    --bg3: #e4d8c6;
    --card: #faf6f0;
    --text: #2e2218;
    --text-muted: #9a8570;
    --accent: #8b5e3c;
    --accent2: #b07d55;
    --accent-dim: rgba(139,94,60,0.1);
    --border: rgba(139,94,60,0.18);
    --radius: 8px;
    --shadow: 0 4px 24px rgba(80,50,20,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', 'Noto Sans TC', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
    opacity: 0.6;
    pointer-events: none;
    z-index: 0;
  }

  /* ===== HEADER ===== */
  header {
    position: relative;
    padding: 60px 48px 40px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(139,94,60,0.06) 0%, transparent 100%);
    z-index: 1;
  }

  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .logo-area h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 52px;
    font-weight: 300;
    letter-spacing: -1px;
    line-height: 1;
  }

  .logo-area h1 em { font-style: italic; color: var(--accent2); }

  .logo-area p {
    margin-top: 8px;
    color: var(--text-muted);
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .stats-bar { display: flex; gap: 32px; }

  .stat { text-align: right; }

  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 300;
    color: var(--accent2);
    line-height: 1;
  }

  .stat-label { font-size: 11px; color: var(--text-muted); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px; }

  /* ===== CONTROLS ===== */
  .controls {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(244,237,226,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 16px 48px;
  }

  .controls-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .controls-top {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    max-width: 360px;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 14px;
  }

  .search-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 24px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    padding: 9px 16px 9px 38px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-muted); }

  .filter-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-label {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
    white-space: nowrap;
    min-width: 28px;
  }

  .filter-btn, .status-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-btn:hover, .status-btn:hover { color: var(--text); border-color: var(--border); }
  .filter-btn.active { background: var(--accent); color: #141210; border-color: var(--accent); font-weight: 500; }

  .status-btn[data-status="全部"].active { background: var(--accent); color: #0f0e0d; border-color: var(--accent); }
  .status-btn[data-status="待學"].active { background: var(--text-muted); color: #0f0e0d; border-color: var(--text-muted); }
  .status-btn[data-status="學習中"].active { background: #6aade0; color: #0f0e0d; border-color: #6aade0; }
  .status-btn[data-status="已完成"].active { background: #6ac08a; color: #0f0e0d; border-color: #6ac08a; }

  .divider { width: 1px; height: 16px; background: var(--border); flex-shrink: 0; }

  /* ===== RESULT INFO ===== */
  .result-info {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px 48px 0;
    color: var(--text-muted);
    font-size: 12px;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .result-info span { color: var(--accent2); }

  /* ===== GRID ===== */
  .grid-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 48px 80px;
  }

  .courses-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
  }

  /* ===== COURSE CARD ===== */
  .course-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid rgba(139,94,60,0.1);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    animation: fadeIn 0.4s ease both;
    overflow: hidden;
    position: relative;
    box-shadow: 0 2px 8px rgba(80,50,20,0.07);
  }

  .course-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 28px rgba(80,50,20,0.15);
    border-color: var(--accent2);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Card top visual area */
  .course-visual {
    position: relative;
    height: 130px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .course-visual::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.25) 100%);
  }

  .platform-initial {
    font-family: 'Cormorant Garamond', serif;
    font-size: 52px;
    font-weight: 300;
    color: rgba(255,255,255,0.35);
    letter-spacing: -2px;
    user-select: none;
    z-index: 1;
  }

  .platform-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    padding: 3px 9px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 500;
    z-index: 2;
    letter-spacing: 0.3px;
  }

  .status-badge-card {
    position: absolute;
    top: 10px;
    right: 10px;
    padding: 3px 9px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 500;
    z-index: 2;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .course-card:hover .status-badge-card { opacity: 1; }
  .status-badge-card.待學 { background: rgba(138,122,106,0.85); color: #fff; }
  .status-badge-card.學習中 { background: rgba(106,173,224,0.85); color: #fff; }
  .status-badge-card.已完成 { background: rgba(106,192,138,0.85); color: #fff; }

  /* Card body */
  .course-body {
    padding: 14px 14px 12px;
  }

  .course-title {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.5;
    color: var(--text);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 8px;
    min-height: 39px;
  }

  .course-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }

  .course-instructor {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .course-type-tag {
    font-size: 10px;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2px 7px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* Progress bar */
  .course-progress {
    height: 2px;
    background: var(--bg3);
    border-radius: 1px;
    margin-top: 12px;
    overflow: hidden;
  }
  .course-progress-bar {
    height: 100%;
    border-radius: 1px;
    background: var(--accent);
    transition: width 0.3s;
  }

  /* ===== PLATFORM COLORS (earthy/muted) ===== */
  .platform-hahow     { background: linear-gradient(135deg, #c47a52 0%, #9a5535 100%); }
  .platform-pressplay { background: linear-gradient(135deg, #c4607a 0%, #9a3f56 100%); }
  .platform-satellite { background: linear-gradient(135deg, #6a92b8 0%, #476d92 100%); }
  .platform-udemy     { background: linear-gradient(135deg, #9a72b8 0%, #735292 100%); }
  .platform-youtube   { background: linear-gradient(135deg, #c46060 0%, #9a3f3f 100%); }
  .platform-coursera  { background: linear-gradient(135deg, #5478b8 0%, #365492 100%); }
  .platform-elsa      { background: linear-gradient(135deg, #b87a9a 0%, #8f5476 100%); }
  .platform-kim       { background: linear-gradient(135deg, #5a6eb8 0%, #3a4d92 100%); }
  .platform-other     { background: linear-gradient(135deg, #8a9a7a 0%, #677558 100%); }

  .badge-hahow     { background: rgba(180,106,72,0.88); color: #fff; }
  .badge-pressplay { background: rgba(180,80,106,0.88); color: #fff; }
  .badge-satellite { background: rgba(90,130,170,0.88); color: #fff; }
  .badge-udemy     { background: rgba(140,96,170,0.88); color: #fff; }
  .badge-youtube   { background: rgba(180,80,80,0.88); color: #fff; }
  .badge-coursera  { background: rgba(72,102,165,0.88); color: #fff; }
  .badge-elsa      { background: rgba(160,80,130,0.88); color: #fff; }
  .badge-kim       { background: rgba(72,90,170,0.88); color: #fff; }
  .badge-other     { background: rgba(120,138,100,0.88); color: #fff; }

  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%;
    max-width: 480px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: var(--shadow);
    position: relative;
  }

  .modal-header {
    height: 160px;
    border-radius: 16px 16px 0 0;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  .modal-header-initial {
    font-family: 'Cormorant Garamond', serif;
    font-size: 80px;
    font-weight: 300;
    color: rgba(255,255,255,0.2);
    letter-spacing: -3px;
    user-select: none;
  }

  .modal-header-platform {
    position: absolute;
    bottom: 14px;
    left: 16px;
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 500;
  }

  .modal-close {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.55);
    border: 1px solid rgba(255,255,255,0.3);
    color: #3a2810;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: all 0.2s;
    backdrop-filter: blur(4px);
  }
  .modal-close:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

  .modal-body { padding: 24px; }

  .modal-type-tag {
    display: inline-block;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 400;
    line-height: 1.3;
    margin-bottom: 6px;
  }

  .modal-instructor-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 20px;
  }

  .modal-instructor-label {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .modal-instructor-input {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1px dashed var(--border);
    color: var(--text-muted);
    font-size: 13px;
    font-family: inherit;
    padding: 2px 4px;
    outline: none;
    transition: border-color 0.2s, color 0.2s;
    min-width: 0;
  }
  .modal-instructor-input::placeholder { color: rgba(138,122,106,0.35); }
  .modal-instructor-input:focus {
    border-bottom-color: var(--accent);
    color: var(--text);
  }
  .modal-instructor-input[readonly] {
    border-bottom-color: transparent;
    cursor: default;
    pointer-events: none;
  }
  .modal-instructor-saved {
    font-size: 11px;
    color: var(--text-muted);
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
  }
  .modal-instructor-saved.show { opacity: 1; }

  .modal-url-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 11px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--accent-dim);
    color: var(--accent2);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
    margin-bottom: 20px;
  }
  .modal-url-btn:hover { background: var(--accent); color: #0f0e0d; border-color: var(--accent); }

  .modal-rating {
    display: none;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .modal-rating.visible { display: flex; }

  .rating-label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

  .stars { display: flex; gap: 2px; }

  .star {
    font-size: 26px;
    color: rgba(138,122,106,0.25);
    cursor: pointer;
    transition: color 0.15s;
    line-height: 1;
    user-select: none;
  }
  .star.filled { color: var(--accent2); }
  .star.hover  { color: var(--accent2); }

  .modal-notes {
    display: none;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 20px;
  }
  .modal-notes.visible { display: flex; }

  .notes-label { font-size: 12px; color: var(--text-muted); }

  .notes-textarea {
    width: 100%;
    min-height: 90px;
    max-height: 200px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    line-height: 1.7;
    padding: 10px 12px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  .notes-textarea::placeholder { color: rgba(138,122,106,0.4); }
  .notes-textarea:focus { border-color: var(--accent); }

  .notes-saved { font-size: 11px; color: var(--text-muted); opacity: 0; transition: opacity 0.3s; text-align: right; }
  .notes-saved.show { opacity: 1; }

  .modal-actions { display: flex; gap: 8px; }

  .status-select-btn {
    flex: 1;
    padding: 9px 12px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .status-select-btn:hover { border-color: var(--accent); color: var(--accent); }
  .status-select-btn.active { background: var(--accent); border-color: var(--accent); color: #0f0e0d; font-weight: 500; }

  /* card stars */
  .card-stars { display: flex; gap: 1px; font-size: 10px; }
  .card-star { color: rgba(138,122,106,0.25); }
  .card-star.filled { color: var(--accent2); }

  .card-note-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent2);
    flex-shrink: 0;
  }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: rgba(139,94,60,0.25); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    header { padding: 40px 20px 28px; }
    .logo-area h1 { font-size: 36px; }
    .controls { padding: 12px 20px; }
    .grid-container { padding: 20px 20px 60px; }
    .courses-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
    .result-info { padding: 16px 20px 0; }
    .stats-bar { gap: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-area">
      <h1>Mia's <em>課程庫</em></h1>
      <p>2026 學習計畫</p>
    </div>
    <div class="stats-bar">
      <div class="stat">
        <div class="stat-num" id="total-count">0</div>
        <div class="stat-label">總計</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="learning-count">0</div>
        <div class="stat-label">學習中</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="done-count">0</div>
        <div class="stat-label">已完成</div>
      </div>
    </div>
  </div>
</header>

<div class="controls">
  <div class="controls-inner">
    <div class="controls-top">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="search-input" type="text" placeholder="搜尋課程或講師…">
      </div>
    </div>
    <div class="filter-row">
      <span class="filter-label">平台</span>
      <button class="filter-btn active" data-platform="全部">全部</button>
      <button class="filter-btn" data-platform="Hahow">Hahow</button>
      <button class="filter-btn" data-platform="知識衛星">知識衛星</button>
      <button class="filter-btn" data-platform="Pressplay">Pressplay</button>
      <button class="filter-btn" data-platform="艾兒莎">艾兒莎</button>
      <button class="filter-btn" data-platform="阿金">阿金</button>
      <button class="filter-btn" data-platform="其他">其他</button>
    </div>
    <div class="filter-row">
      <span class="filter-label">狀態</span>
      <button class="status-btn active" data-status="全部">全部</button>
      <button class="status-btn" data-status="待學">待學</button>
      <button class="status-btn" data-status="學習中">學習中</button>
      <button class="status-btn" data-status="已完成">已完成</button>
    </div>
  </div>
</div>

<div class="result-info">
  <div>顯示 <span id="showing-count">0</span> 堂</div>
</div>

<div class="grid-container">
  <div class="courses-grid" id="courses-grid"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModalBtn()">×</button>
    <div class="modal-header" id="modal-header">
      <div class="modal-header-initial" id="modal-header-initial"></div>
      <div class="modal-header-platform" id="modal-header-platform"></div>
    </div>
    <div class="modal-body">
      <div class="modal-type-tag" id="modal-type"></div>
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-instructor-wrap">
        <span class="modal-instructor-label">講師</span>
        <input class="modal-instructor-input" id="modal-instructor-input" type="text" placeholder="輸入講師名稱…">
        <span class="modal-instructor-saved" id="modal-instructor-saved">已儲存 ✓</span>
      </div>
      <a class="modal-url-btn" id="modal-url-btn" href="#" target="_blank" rel="noopener">
        ↗ 前往課程平台
      </a>

// Platform config
const platformConfig = {
  'Hahow':    { class: 'platform-hahow',     badge: 'badge-hahow',     initial: 'H' },
  '知識衛星':  { class: 'platform-satellite',  badge: 'badge-satellite', initial: '衛' },
  'Pressplay':{ class: 'platform-pressplay',  badge: 'badge-pressplay', initial: 'P' },
  '艾兒莎':   { class: 'platform-elsa',       badge: 'badge-elsa',      initial: '艾' },
  '阿金':     { class: 'platform-kim',        badge: 'badge-kim',       initial: '金' },
  'Udemy':    { class: 'platform-udemy',      badge: 'badge-udemy',     initial: 'U' },
  'YouTube':  { class: 'platform-youtube',    badge: 'badge-youtube',   initial: 'Y' },
  'Coursera': { class: 'platform-coursera',   badge: 'badge-coursera',  initial: 'C' },
};
function getPlatformConfig(p) { return platformConfig[p] || { class: 'platform-other', badge: 'badge-other', initial: p[0] || '?' }; }

// Storage
const STORAGE_KEY = 'mia_courses_status';
let _storage = null;
try { _storage = localStorage; } catch(e) {}
function storageGet() { try { return JSON.parse((_storage && _storage.getItem(STORAGE_KEY)) || '{}'); } catch(e) { return {}; } }
function storageSet(data) { try { if (_storage) _storage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {} }
let statusMap = storageGet();

// Helpers
function getStatus(id) {
  const e = statusMap[id];
  if (!e) return '待學';
  return typeof e === 'string' ? e : (e.status || '待學');
}

function getRating(id) {
  const e = statusMap[id];
  if (!e || typeof e === 'string') return 0;
  return e.rating || 0;
}

function getNotes(id) {
  const e = statusMap[id];
  if (!e || typeof e === 'string') return '';
  return e.notes || '';
}

function getInstructor(id, fallback) {
  const e = statusMap[id];
  if (e && typeof e === 'object' && e.instructor != null) return e.instructor;
  return (fallback && fallback !== '—') ? fallback : '';
}

function saveInstructor(id, name) {
  const prev = statusMap[id];
  const prevData = (typeof prev === 'object' && prev) ? prev : { status: typeof prev === 'string' ? prev : '待學' };
  statusMap[id] = { ...prevData, instructor: name };
  storageSet(statusMap);
}

function saveStatus(id, s) {
  const prev = statusMap[id];
  const prevStatus = typeof prev === 'string' ? prev : (prev && prev.status) || '待學';
  const prevData = typeof prev === 'object' && prev ? prev : {};
  const entry = { ...prevData, status: s };
  statusMap[id] = entry;
  storageSet(statusMap);
  updateStats();
}

// State
let currentCat = '全部';
let currentStatus = '全部';
let currentSearch = '';
let currentModal = null;
const isLocal = location.protocol === 'file:';

// Render
function render() {
  const grid = document.getElementById('courses-grid');
  const filtered = courses.filter(c => {
    const s = getStatus(c.id);
    const matchPlatform = currentCat === '全部' || c.platform === currentCat;
    const matchStatus = currentStatus === '全部' || s === currentStatus;
    const q = currentSearch.toLowerCase();
    const instrName = getInstructor(c.id, c.instructor).toLowerCase();
    const matchSearch = !q || c.title.toLowerCase().includes(q) || instrName.includes(q);
    return matchPlatform && matchStatus && matchSearch;
  });

  document.getElementById('showing-count').textContent = filtered.length;
  grid.innerHTML = '';

  filtered.forEach((c, i) => {
    const s = getStatus(c.id);
    const pc = getPlatformConfig(c.platform);
    const card = document.createElement('div');
    card.className = 'course-card';
    card.style.animationDelay = `${Math.min(i * 0.04, 0.5)}s`;

    const progress = s === '已完成' ? 100 : s === '學習中' ? 45 : 0;

    card.innerHTML = `
      <div class="course-visual ${pc.class}">
        ${c.img ? `<img src="課程封面/${encodeURIComponent(c.img)}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'">` : `<div class="platform-initial">${pc.initial}</div>`}
        <div class="platform-badge ${pc.badge}">${c.platform}</div>
        ${isLocal ? `<div class="status-badge-card ${s}">${s}</div>` : ''}
      </div>
      <div class="course-body">
        <div class="course-title">${c.title}</div>
        <div class="course-meta">
          <span class="course-instructor">${getInstructor(c.id, c.instructor) || '—'}</span>
          <span class="course-type-tag">${c.type}</span>
        </div>
        ${isLocal ? `<div class="course-progress"><div class="course-progress-bar" style="width:${progress}%"></div></div>` : ''}
      </div>
    `;

    card.addEventListener('click', () => openModal(c));
    grid.appendChild(card);
  });
}

function updateStats() {
  document.getElementById('total-count').textContent = courses.length;
  document.getElementById('learning-count').textContent = courses.filter(c => getStatus(c.id) === '學習中').length;
  document.getElementById('done-count').textContent = courses.filter(c => getStatus(c.id) === '已完成').length;
}

// Filters
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.platform;
    render();
  });
});

document.querySelectorAll('.status-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentStatus = btn.dataset.status;
    render();
  });
});

document.getElementById('search-input').addEventListener('input', e => {
  currentSearch = e.target.value;
  render();
});

// Modal
function openModal(c) {
  currentModal = c;
  const s = getStatus(c.id);
  const pc = getPlatformConfig(c.platform);

  const modalHeader = document.getElementById('modal-header');
  modalHeader.className = `modal-header ${pc.class}`;
  if (c.img) {
    modalHeader.style.backgroundImage = `url('課程封面/${encodeURIComponent(c.img)}')`;
    modalHeader.style.backgroundSize = 'cover';
    modalHeader.style.backgroundPosition = 'center';
    document.getElementById('modal-header-initial').style.visibility = 'hidden';
  } else {
    modalHeader.style.backgroundImage = '';
    document.getElementById('modal-header-initial').style.visibility = '';
    document.getElementById('modal-header-initial').textContent = pc.initial;
  }
  document.getElementById('modal-header-platform').className = `modal-header-platform ${pc.badge}`;
  document.getElementById('modal-header-platform').textContent = c.platform;
  document.getElementById('modal-type').textContent = c.type;
  document.getElementById('modal-title').textContent = c.title;

  const instrInput = document.getElementById('modal-instructor-input');
  instrInput.value = getInstructor(c.id, c.instructor);
  instrInput.readOnly = !isLocal;
  document.getElementById('modal-instructor-saved').classList.remove('show');
  document.getElementById('modal-instructor-saved').style.display = isLocal ? '' : 'none';

  const urlBtn = document.getElementById('modal-url-btn');
  if (!isLocal && c.url) { urlBtn.href = c.url; urlBtn.style.display = ''; }
  else if (isLocal && c.url) { urlBtn.href = c.url; urlBtn.style.display = ''; }
  else { urlBtn.style.display = 'none'; }

  document.getElementById('modal-actions').style.display = isLocal ? '' : 'none';

  if (isLocal) {
    document.querySelectorAll('.status-select-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.s === s);
    });
    document.getElementById('modal-rating').classList.toggle('visible', s === '已完成');
    updateStars(getRating(c.id));
    document.getElementById('modal-notes').classList.toggle('visible', s === '學習中' || s === '已完成');
    document.getElementById('notes-textarea').value = getNotes(c.id);
    document.getElementById('notes-saved').classList.remove('show');
  } else {
    document.getElementById('modal-rating').classList.remove('visible');
    document.getElementById('modal-notes').classList.remove('visible');
  }

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) { if (e.target === document.getElementById('modal-overlay')) closeModalBtn(); }
function closeModalBtn() { document.getElementById('modal-overlay').classList.remove('open'); document.body.style.overflow = ''; }

function setStatus(btn) {
  if (!currentModal) return;
  const s = btn.dataset.s;
  saveStatus(currentModal.id, s);
  document.querySelectorAll('.status-select-btn').forEach(b => b.classList.toggle('active', b.dataset.s === s));
  render();
  openModal(currentModal);
}

// Stars
function updateStars(rating, hoverVal) {
  const val = hoverVal !== undefined ? hoverVal : rating;
  document.querySelectorAll('#modal-stars .star').forEach(star => {
    const v = parseInt(star.dataset.v);
    star.classList.toggle('filled', hoverVal === undefined && v <= rating);
    star.classList.toggle('hover', hoverVal !== undefined && v <= val);
  });
}

function initStarEvents() {
  document.getElementById('modal-stars').querySelectorAll('.star').forEach(star => {
    star.addEventListener('mouseenter', () => updateStars(getRating(currentModal.id), parseInt(star.dataset.v)));
    star.addEventListener('mouseleave', () => updateStars(getRating(currentModal.id)));
    star.addEventListener('click', () => {
      if (!currentModal) return;
      const v = parseInt(star.dataset.v);
      const entry = statusMap[currentModal.id];
      if (entry && typeof entry === 'object') { entry.rating = v; storageSet(statusMap); updateStars(v); }
    });
  });
}

// Instructor
let _instrSaveTimer = null;
function initInstructorEvents() {
  const input = document.getElementById('modal-instructor-input');
  const savedEl = document.getElementById('modal-instructor-saved');
  input.addEventListener('input', () => {
    if (!isLocal) return;
    clearTimeout(_instrSaveTimer);
    _instrSaveTimer = setTimeout(() => {
      if (!currentModal) return;
      saveInstructor(currentModal.id, input.value.trim());
      savedEl.classList.add('show');
      setTimeout(() => savedEl.classList.remove('show'), 1800);
      render();
    }, 600);
  });
}

// Notes
let _notesSaveTimer = null;
function initNotesEvents() {
  const textarea = document.getElementById('notes-textarea');
  const savedEl = document.getElementById('notes-saved');
  textarea.addEventListener('input', () => {
    clearTimeout(_notesSaveTimer);
    _notesSaveTimer = setTimeout(() => {
      if (!currentModal) return;
      const entry = statusMap[currentModal.id];
      if (entry && typeof entry === 'object') {
        entry.notes = textarea.value;
        storageSet(statusMap);
        savedEl.classList.add('show');
        setTimeout(() => savedEl.classList.remove('show'), 1800);
      }
    }, 600);
  });
}

// ESC
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalBtn(); });

// Init
updateStats();
render();
initStarEvents();
initNotesEvents();
initInstructorEvents();
</script>
